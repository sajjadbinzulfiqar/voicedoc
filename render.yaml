databases:
  - name: voicedoc-db
    plan: basic_256mb
    region: singapore
    postgresMajorVersion: 16

services:
  - type: web
    name: voicedoc
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: NEXT_PUBLIC_ELEVENLABS_AGENT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: voicedoc-db
          property: connectionString
    healthCheckPath: /
